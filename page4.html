<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose my love ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Alex+Brush&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--pink:#FF69B4;--deep:#FF1493;--bg:linear-gradient(135deg,#FFD1DC,#FFF0F5,#FFB6C1);--btn:linear-gradient(135deg,#FF69B4,#FF1493,#DC143C);--shadow:rgba(255,105,180,.35);--h:'Great Vibes',cursive;--s:'Alex Brush',cursive;--b:'Poppins',sans-serif;}
  body{min-height:100vh;background:var(--bg);display:flex;align-items:flex-start;justify-content:center;font-family:var(--b);overflow-y:auto;padding:3rem 0}
  .heart{position:fixed;font-size:20px;opacity:.8;animation:floatUp linear infinite;pointer-events:none;z-index:1}
  @keyframes floatUp{from{transform:translateY(110vh)}to{transform:translateY(-10vh)}}
  .card{background:rgba(255,255,255,.96);padding:2.5rem;border-radius:2rem;max-width:500px;width:90%;text-align:center;box-shadow:0 25px 50px var(--shadow);animation:fadeIn 0.7s ease;z-index:5;position:relative}
  @keyframes fadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
  h1{font-family:var(--h);font-size:3rem;background:var(--btn);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-family:var(--s);font-size:1.5rem;color:var(--deep);margin-bottom:1.5rem}
  .options{display:flex;flex-direction:column;gap:1rem;margin:1.5rem 0}
  .opt{background:linear-gradient(135deg,#FFE4EC,#FFD1DC);border:none;padding:1rem;border-radius:1.8rem;font-family:var(--s);font-size:1.4rem;cursor:pointer;transition:0.2s;box-shadow:0 5px 12px var(--shadow)}
  .opt:hover{transform:scale(1.03)}
  .result{min-height:70px;font-family:var(--s);font-size:1.5rem;color:var(--deep);margin:1rem 0}
  .next{display:inline-block;margin-top:0.8rem;background:var(--btn);padding:0.7rem 2rem;border-radius:2rem;text-decoration:none;color:white;font-family:var(--s);font-size:1.3rem}
  .kiss-pop{position:fixed;font-size:28px;animation:kissPop 1.2s forwards;pointer-events:none;z-index:20}
  @keyframes kissPop{0%{opacity:0;transform:scale(0.3)}30%{opacity:1}100%{opacity:0;transform:translateY(-70px) scale(1.5)}}
</style>
</head>
<body>
<div class="card">
  <h1>Zobiya 💕</h1>
  <div class="sub">What do you say?</div>
  <div class="options">
    <button class="opt" onclick="reply('forgive')">💖 I forgive you</button>
    <button class="opt" onclick="reply('hug')">🤗 Send a warm hug</button>
    <button class="opt" onclick="reply('kiss')">💋 I love you too</button>
  </div>
  <div class="result" id="result"></div>
  <a href="page5.html" class="next">Final Promise ➜</a>
</div>
<script>
  const hearts=["💖","💕","💗","❤️","💞"];
  setInterval(()=>{
    const h=document.createElement("div");h.className="heart";
    h.innerText=hearts[Math.floor(Math.random()*hearts.length)];
    h.style.left=Math.random()*100+"vw";h.style.animationDuration=3+Math.random()*4+"s";
    document.body.appendChild(h);setTimeout(()=>h.remove(),7000);
  },450);
  function spawnKiss(){
    for(let i=0;i<5;i++){ 
      const k=document.createElement("div");k.className="kiss-pop";
      k.innerText="💋💖";k.style.left=(30+Math.random()*40)+"%";k.style.top="55%";
      document.body.appendChild(k);setTimeout(()=>k.remove(),1300);
    }
  }
  function reply(choice){
    const res=document.getElementById("result");
    if(choice==='forgive'){res.innerText="💖 Thank you my love! I'll never hurt you again. 💖"; spawnKiss();}
    else if(choice==='hug'){res.innerText="🤗 *tight hug* I can feel your warmth... I love you! 💕"; spawnKiss();}
    else{res.innerText="💋 I love you more than anything, Zobiya. Forever yours. 💋"; spawnKiss();}
  }
</script>
</body>
</html>
